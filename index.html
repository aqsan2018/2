<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Universe</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Playfair+Display:ital,wght@0,500;1,600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-0: #05060d;
            --space-1: #090a15;
            --space-2: #131533;
            --space-3: #1b2450;
            --cyan:    #00d4ff;
            --cyan-2:  #00aaff;
            --violet:  #8b5cf6;
            --pink:    #ff5c8a;
            --pink-2:  #d63384;
            --star:    #ffffff;
            --glass-bg: rgba(255,255,255,0.06);
            --glass-brd: rgba(255,255,255,0.18);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
            --grad-cta: linear-gradient(135deg, #00d4ff 0%, #4f8bff 55%, #8b5cf6 100%);
            --grad-heart: linear-gradient(135deg, #ff6f9f, #e02f7f 55%, #8b1f55);
        }

        /* General Setup */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: #05060d;
            overflow: hidden;
            color: white;
        }

        /* --- Main Content (Hidden by default) --- */
        #main-content {
            visibility: hidden;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Layered nebula background */
        #nebula {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
              radial-gradient(1200px 800px at 18% 22%, rgba(139,92,246,0.28) 0%, transparent 60%),
              radial-gradient(1000px 700px at 82% 78%, rgba(0,170,255,0.24) 0%, transparent 55%),
              radial-gradient(900px 600px at 60% 15%, rgba(255,92,138,0.18) 0%, transparent 60%),
              radial-gradient(ellipse at center, #101a35 0%, #05060d 70%);
            animation: nebulaShift 24s ease-in-out infinite alternate;
        }
        @keyframes nebulaShift {
            0%   { filter: hue-rotate(0deg) saturate(1); transform: scale(1); }
            100% { filter: hue-rotate(25deg) saturate(1.15); transform: scale(1.05); }
        }
        #nebula::after {
            content:''; position:absolute; inset:0;
            background-image:
              radial-gradient(1px 1px at 10% 20%, #fff, transparent),
              radial-gradient(1px 1px at 30% 70%, #fff, transparent),
              radial-gradient(1px 1px at 55% 40%, #fff, transparent),
              radial-gradient(1px 1px at 75% 85%, #fff, transparent),
              radial-gradient(1px 1px at 88% 12%, #fff, transparent),
              radial-gradient(1px 1px at 42% 92%, #fff, transparent),
              radial-gradient(1px 1px at 5% 55%, #fff, transparent),
              radial-gradient(1px 1px at 95% 45%, #fff, transparent),
              radial-gradient(1px 1px at 22% 8%, #fff, transparent),
              radial-gradient(1px 1px at 68% 62%, #fff, transparent);
            opacity: .55;
            animation: twinkleBg 4s ease-in-out infinite alternate;
        }
        @keyframes twinkleBg { from { opacity: .35 } to { opacity: .75 } }

        #parallax-layer {
            position: fixed; inset: -5%; z-index: 1; pointer-events: none;
            transition: transform 1.2s cubic-bezier(.2,.9,.2,1);
        }
        .p-star {
            position: absolute; width: 2px; height: 2px; border-radius: 50%;
            background: #fff; box-shadow: 0 0 6px #fff;
        }

        /* Shooting stars */
        #shooters { position: fixed; inset:0; z-index: 2; pointer-events: none; overflow:hidden; }
        .shooter {
            position: absolute; width: 140px; height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0), #fff, rgba(0,212,255,.9));
            border-radius: 999px;
            filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 12px #00d4ff);
            opacity: 0; transform: rotate(-25deg);
            animation: shoot 2.2s ease-out forwards;
        }
        @keyframes shoot {
            0%   { opacity:0; transform: translate(0,0) rotate(-25deg) scaleX(.2); }
            15%  { opacity:1; }
            100% { opacity:0; transform: translate(-60vw, 30vh) rotate(-25deg) scaleX(1); }
        }

        #universe-container, #filler-stars-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10;
        }
        #universe-container { pointer-events: auto; z-index: 11; }

        /* Cursor comet */
        .comet {
            position: fixed; width: 6px; height: 6px; border-radius: 50%;
            background: #fff; box-shadow: 0 0 8px #fff, 0 0 16px #00d4ff, 0 0 28px #8b5cf6;
            pointer-events: none; z-index: 50;
            transform: translate(-50%,-50%); opacity: .9;
            transition: opacity .4s ease;
            mix-blend-mode: screen;
        }
        .comet.trail { opacity:.45; }

        /* Main Interactive Star Styling */
        .star {
            width: 14px;
            height: 14px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #cfe8ff 55%, #7fb8ff);
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            box-shadow: 0 0 6px #fff, 0 0 14px #fff, 0 0 26px #00d4ff, 0 0 40px #00aaff, 0 0 60px rgba(139,92,246,.6);
            animation: twinkle 2.2s infinite alternate ease-in-out;
            transition: transform 2.5s ease-in-out, opacity 1s ease, box-shadow 0.3s ease, left 2.5s ease-in-out, top 2.5s ease-in-out,
                        width 0.3s ease, height 0.3s ease;
        }
        .star::before {
            content:''; position:absolute; inset:-14px; border-radius:50%;
            background: radial-gradient(circle, rgba(0,212,255,.35), transparent 60%);
            animation: haloPulse 3s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes haloPulse {
            0%,100% { transform: scale(1); opacity:.4; }
            50%     { transform: scale(1.4); opacity:.9; }
        }

        /* Filler Star Styling */
        .filler-star {
            width: 6px;
            height: 6px;
            background: #ffffff;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 5px #fff, 0 0 12px #ff5c8a;
            transition: opacity 0.6s ease, box-shadow .4s ease;
            z-index: 5;
            opacity: 0;
        }

        .star.final-look {
            width: 7px;
            height: 7px;
            background: #fff;
            box-shadow: 0 0 6px #fff, 0 0 14px #ff5c8a, 0 0 24px #d63384;
            animation: none;
            transform: scale(1);
        }
        .star.final-look::before { background: radial-gradient(circle, rgba(255,92,138,.4), transparent 60%); }

        .star:hover {
            box-shadow: 0 0 8px #fff, 0 0 18px #fff, 0 0 32px #ff5c8a, 0 0 50px #ff00ff, 0 0 70px #8b5cf6;
            transform: scale(1.15);
        }

        .star.clicked {
            opacity: 0.35;
            cursor: default;
            animation-play-state: paused;
            pointer-events: none;
        }
        .star.clicked::before { opacity: 0; }

        @keyframes twinkle {
            from { transform: scale(1); }
            to   { transform: scale(1.35); }
        }

        /* Burst particles */
        .burst { position:absolute; pointer-events:none; z-index: 20; }
        .burst span {
            position:absolute; left:0; top:0; width:5px; height:5px; border-radius:50%;
            background:#fff; box-shadow: 0 0 6px #fff, 0 0 12px #00d4ff;
            animation: burst .9s ease-out forwards;
        }
        @keyframes burst {
            to { transform: translate(var(--dx), var(--dy)) scale(0); opacity:0; }
        }

        /* Progress constellation */
        #progress {
            position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
            z-index: 30; display:flex; gap:14px; align-items:center;
            padding: 10px 18px; border-radius: 999px;
            background: rgba(9,10,21,.5); backdrop-filter: blur(14px) saturate(140%);
            border: 1px solid rgba(255,255,255,.1);
            box-shadow: 0 8px 30px rgba(0,0,0,.45);
        }
        #progress .p-label {
            font-family:'Orbitron', sans-serif; font-size: 10px; letter-spacing:.24em;
            color:#9fc9ff; text-transform:uppercase; margin-right: 4px;
        }
        #progress .p-dot {
            width: 10px; height: 10px; border-radius:50%;
            background: rgba(255,255,255,.15);
            box-shadow: inset 0 0 6px rgba(255,255,255,.15);
            transition: all .5s cubic-bezier(.2,.9,.2,1.4);
        }
        #progress .p-dot.on {
            background: radial-gradient(circle at 30% 30%, #fff, #ff5c8a 60%, #8b1f55);
            box-shadow: 0 0 8px #fff, 0 0 16px #ff5c8a, 0 0 26px #d63384;
            transform: scale(1.2);
        }

        /* Text Styling */
        #intro-message {
            position: absolute;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.75em;
            color: rgba(255, 255, 255, 0.92);
            text-shadow: 0 0 24px rgba(0,170,255,.35), 0 2px 20px rgba(0,0,0,.6);
            z-index: 15;
            transition: opacity 1.6s ease, transform 1.6s ease;
            text-align: center;
            width: 90%;
            letter-spacing: .01em;
            animation: introFloat 6s ease-in-out infinite alternate;
        }
        #intro-message .sub {
            display:block; margin-top: 8px;
            font-family:'Orbitron', sans-serif; font-style: normal;
            font-size: .42em; letter-spacing: .32em; text-transform: uppercase;
            color:#7fb8ff; opacity:.75;
        }
        @keyframes introFloat {
            from { transform: translate(-50%, 0); }
            to   { transform: translate(-50%, -8px); }
        }

        #final-message {
            position: absolute;
            top: 12%;
            left: 50%;
            width: 90%;
            transform: translateX(-50%);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3em;
            color: #fff;
            text-align: center;
            z-index: 15;
            background: linear-gradient(120deg, #fff 20%, #ffd6e5 40%, #ff7fb0 55%, #fff 75%);
            background-size: 200% 100%;
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 22px rgba(255,120,170,.45));
            animation: shimmer 6s linear infinite;
        }
        @keyframes shimmer {
            from { background-position: 200% 0; }
            to   { background-position: -200% 0; }
        }

        /* Modal Styles — glass dark */
        #modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, rgba(5,6,13,.65), rgba(5,6,13,.9));
            backdrop-filter: blur(14px) saturate(140%);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #modal-content {
            background: linear-gradient(180deg, rgba(20,24,50,.85), rgba(9,10,21,.9));
            border: 1px solid rgba(255,255,255,.14);
            padding: 22px; border-radius: 22px; text-align: center;
            max-width: min(520px, 92vw); max-height: 90%;
            box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 60px rgba(0,170,255,.25), inset 0 1px 0 rgba(255,255,255,.1);
            position: relative; transform: scale(0.85) translateY(20px);
            transition: transform 0.55s cubic-bezier(.2,.9,.2,1.2);
        }
        #modal.visible { opacity: 1; pointer-events: all; }
        #modal.visible #modal-content { transform: scale(1) translateY(0); }
        #modal-image {
            max-width: 100%; max-height: 62vh; border-radius: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,.5);
        }
        #modal-caption {
            color: #e8f4ff; font-family:'Playfair Display', serif; font-style: italic;
            font-size: 1.35em; margin-top: 16px;
            text-shadow: 0 0 10px rgba(0,170,255,.35);
        }
        .close-button {
            position: absolute; top: 10px; right: 16px;
            width: 34px; height: 34px; display:grid; place-items:center;
            font-size: 1.4em; color: #e8f4ff; cursor: pointer;
            border-radius: 50%; background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.12);
            transition: all .2s ease;
        }
        .close-button:hover { background: rgba(255,92,138,.25); transform: rotate(90deg); }
        .hidden { opacity: 0; pointer-events: none; }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .star { width: 10px; height: 10px; }
            .filler-star, .star.final-look { width: 5px; height: 5px; }
            #intro-message { font-size: 1.25em; }
            #final-message { font-size: 2em; top: 18%; }
            #progress { top: 14px; padding: 8px 14px; gap: 10px; }
            #progress .p-label { display:none; }
            .comet { display:none; }
        }

        /* ---------- Premium interactive loader ---------- */
        #loader {
            position: fixed; inset: 0; z-index: 300;
            background:
              radial-gradient(1200px 700px at 20% 10%, rgba(139,92,246,0.35) 0%, transparent 60%),
              radial-gradient(900px 700px at 90% 90%, rgba(0,170,255,0.30) 0%, transparent 55%),
              radial-gradient(ellipse at center, #1b2735 0%, #05060d 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity .7s ease;
            overflow: hidden;
        }
        #loader .stage {
            position: relative; width: 160px; height: 160px;
            display: flex; align-items: center; justify-content: center;
        }
        .loader-heart {
            width: 86px; height: 86px;
            animation: beat 1.1s ease-in-out infinite;
            filter: drop-shadow(0 10px 24px rgba(255,92,138,0.55)) drop-shadow(0 0 30px rgba(0,212,255,0.35));
        }
        .loader-heart svg { width: 100%; height: 100%; display: block; }
        @keyframes beat {
            0%,100% { transform: scale(1); }
            30% { transform: scale(1.22); }
            45% { transform: scale(.95); }
            65% { transform: scale(1.12); }
            80% { transform: scale(.98); }
        }

        /* Floating stardust in loader */
        #loader .petals { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
        #loader .petal {
            position: absolute; bottom: -20px; width: 3px; height: 3px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 6px #fff, 0 0 12px #00aaff;
            opacity: .8;
            animation: rise linear infinite;
        }
        @keyframes rise {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: .95; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }

        #loader .msg {
            margin-top: 28px; font-family:'Playfair Display', serif; font-style: italic;
            color: #e8f4ff; letter-spacing: .06em; font-size: 18px;
            min-height: 26px; text-align: center;
            text-shadow: 0 0 12px rgba(0,170,255,.4);
            animation: msgFade .6s ease;
        }
        #loader .dots { display:inline-block; width: 22px; text-align:left; }
        #loader .dots::after { content:''; animation: dots 1.4s steps(4, end) infinite; }
        @keyframes dots { 0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';} 100%{content:'';} }
        @keyframes msgFade { from { opacity:0; transform: translateY(6px);} to { opacity:1; transform:none;} }
        #loader .hint {
            margin-top: 10px; font-size: 12px; color: #7fb8ff;
            letter-spacing:.22em; text-transform: uppercase; opacity:.8;
            font-family: 'Orbitron', sans-serif;
        }

        /* --- Premium Password Lock (Cosmic Glass) --- */
        #password-overlay {
            position: fixed; inset: 0; z-index: 200;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
            background:
                radial-gradient(1000px 600px at 20% 10%, rgba(139,92,246,0.35) 0%, transparent 60%),
                radial-gradient(800px 600px at 90% 90%, rgba(0,170,255,0.30) 0%, transparent 55%),
                rgba(5,6,13,0.75);
            backdrop-filter: blur(14px) saturate(140%);
            transition: opacity .5s ease;
        }

        #lock-box {
            width: 100%; max-width: 380px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-brd);
            border-radius: 24px;
            padding: 32px 28px 28px;
            backdrop-filter: blur(24px) saturate(160%);
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.15);
            text-align: center;
            animation: floatIn .7s cubic-bezier(.2,.9,.2,1.1) both;
        }
        @keyframes floatIn { from { opacity: 0; transform: translateY(20px) scale(.96); } to { opacity: 1; transform: none; } }

        .lock-icon {
            width: 84px; height: 84px; margin: 0 auto 14px;
            position: relative; display: grid; place-items: center;
            border-radius: 50%;
            background: var(--grad-cta);
            box-shadow: 0 12px 30px rgba(0,170,255,.45), inset 0 2px 0 rgba(255,255,255,.35);
            animation: lockEntry 1.1s cubic-bezier(.2,.9,.2,1.3) both, lockBreath 3.6s ease-in-out 1.1s infinite;
        }
        .lock-icon::before {
            content: ''; position: absolute; inset: -14px; border-radius: 50%;
            border: 2px solid rgba(0,212,255,.6);
            opacity: 0; animation: haloRing 2.8s ease-out 1.2s infinite;
        }
        .lock-icon svg { width: 42px; height: 42px; color: white; position: relative; z-index: 1; overflow: visible; }
        .lock-icon .shackle {
            transition: transform .6s cubic-bezier(.5,-0.4,.3,1.6);
            transform-origin: 0% 100%;
            transform-box: fill-box;
            animation: shackleJiggle 4s ease-in-out 1.4s infinite;
        }
        .lock-icon.unlocked { animation: lockPop .8s cubic-bezier(.2,.9,.2,1.4) both; }
        .lock-icon.unlocked .shackle { transform: rotate(-48deg) translate(0,-10px); animation: none; }
        .lock-icon::after {
            content: ''; position: absolute; inset: -8px; border-radius: 50%;
            background: radial-gradient(closest-side, rgba(0,212,255,.7), transparent 70%);
            opacity: 0; transition: opacity .5s;
        }
        .lock-icon.unlocked::after { opacity: 1; animation: pulseGlow 1s ease-out; }
        @keyframes pulseGlow { 0% { transform: scale(.9); opacity: .9; } 100% { transform: scale(1.8); opacity: 0; } }
        @keyframes lockEntry {
            0%   { opacity: 0; transform: translateY(-30px) scale(.4) rotate(-18deg); }
            60%  { opacity: 1; transform: translateY(6px) scale(1.08) rotate(4deg); }
            80%  { transform: translateY(-2px) scale(.98) rotate(-2deg); }
            100% { opacity: 1; transform: none; }
        }
        @keyframes lockBreath {
            0%,100% { box-shadow: 0 12px 30px rgba(0,170,255,.45), inset 0 2px 0 rgba(255,255,255,.35); transform: scale(1); }
            50%     { box-shadow: 0 18px 44px rgba(0,212,255,.6), inset 0 2px 0 rgba(255,255,255,.5); transform: scale(1.04); }
        }
        @keyframes shackleJiggle {
            0%, 88%, 100% { transform: rotate(0) translateY(0); }
            92% { transform: rotate(-6deg) translateY(-1px); }
            96% { transform: rotate(5deg) translateY(-1px); }
        }
        @keyframes haloRing {
            0%   { opacity: .6; transform: scale(.85); }
            80%  { opacity: 0;   transform: scale(1.35); }
            100% { opacity: 0;   transform: scale(1.35); }
        }
        @keyframes lockPop {
            0%   { transform: scale(1); }
            35%  { transform: scale(1.22) rotate(-6deg); }
            65%  { transform: scale(.94) rotate(3deg); }
            100% { transform: scale(1) rotate(0); }
        }

        #lock-box h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px; color: #e8f4ff; margin: 0 0 4px;
            letter-spacing: .05em;
            text-shadow: 0 0 12px rgba(0,170,255,.4);
        }
        #lock-box .sub {
            font-size: 13px; color: rgba(232,244,255,.65);
            margin: 0 0 18px;
            font-family: 'Inter', sans-serif;
        }

        #password-input {
            font-family: 'Orbitron', sans-serif;
            width: 100%; padding: 14px 16px;
            border-radius: 12px;
            border: 1.5px solid rgba(0,170,255,.35);
            background: rgba(9,10,21,.65);
            color: #fff;
            font-size: 1.25rem; text-align: center; letter-spacing: 8px;
            transition: all .25s ease;
            box-sizing: border-box;
        }
        #password-input:focus {
            outline: none; border-color: var(--cyan);
            background: rgba(9,10,21,.85);
            box-shadow: 0 0 0 4px rgba(0,212,255,.18);
        }

        /* Keypad */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
        .key {
            padding: 14px 0; border-radius: 14px;
            border: 1px solid rgba(255,255,255,.12);
            background: rgba(255,255,255,.05);
            color: #e8f4ff;
            font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 600;
            cursor: pointer; user-select: none;
            transition: transform .12s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
            backdrop-filter: blur(8px);
            animation: keyIn .5s ease both;
        }
        .key:hover { background: rgba(0,170,255,.15); border-color: rgba(0,212,255,.5); }
        .key:active { transform: scale(.92); box-shadow: 0 4px 12px rgba(0,170,255,.35); }
        .key.action { background: var(--grad-cta); color: white; border: none; }
        .key.action:hover { filter: brightness(1.1); }
        .key.ghost { background: rgba(255,255,255,.03); }
        @keyframes keyIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        .keypad .key:nth-child(1){animation-delay:.05s}.keypad .key:nth-child(2){animation-delay:.09s}
        .keypad .key:nth-child(3){animation-delay:.13s}.keypad .key:nth-child(4){animation-delay:.17s}
        .keypad .key:nth-child(5){animation-delay:.21s}.keypad .key:nth-child(6){animation-delay:.25s}
        .keypad .key:nth-child(7){animation-delay:.29s}.keypad .key:nth-child(8){animation-delay:.33s}
        .keypad .key:nth-child(9){animation-delay:.37s}.keypad .key:nth-child(10){animation-delay:.41s}
        .keypad .key:nth-child(11){animation-delay:.45s}.keypad .key:nth-child(12){animation-delay:.49s}

        #submit-button { display: none; }

        #error-message {
            color: #ff6b8a;
            font-family: 'Inter', sans-serif;
            font-size: .88rem; height: 1.1rem; margin-top: 10px; font-weight: 500;
            text-shadow: 0 0 8px rgba(255,92,138,.3);
        }

        #wrong-gif {
            display: none;
            width: 150px;
            height: 150px;
            border-radius: 18px;
            margin: 12px auto 0;
            object-fit: cover;
            box-shadow: 0 12px 28px rgba(0,170,255,.25), 0 0 0 1px rgba(255,255,255,.18);
        }
        #wrong-gif.show { display: block; animation: floatIn .3s ease both; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>

    <!-- Premium interactive loader -->
    <div id="loader">
      <div class="petals" id="loaderPetals"></div>
      <div class="stage">
        <div class="loader-heart">
          <svg viewBox="0 0 24 24" fill="url(#heartGrad)" aria-hidden="true">
            <defs>
              <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff6f9f"/>
                <stop offset="55%" stop-color="#e02f7f"/>
                <stop offset="100%" stop-color="#8b1f55"/>
              </linearGradient>
            </defs>
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </div>
      </div>
      <p class="msg"><span id="loaderMsg">Aligning the constellations</span><span class="dots"></span></p>
      <p class="hint">Your secret universe is loading</p>
    </div>

    <!-- Premium Password Overlay -->
    <div id="password-overlay">
        <form id="lock-box" autocomplete="off">
            <div class="lock-icon" id="lockIcon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path class="shackle" d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    <rect x="4" y="11" width="16" height="10" rx="2"/>
                </svg>
            </div>
            <h3>Our Secret Universe</h3>
            <p class="sub">Type the secret code 💕</p>
            <input id="password-input" type="password" inputmode="numeric" maxlength="8" placeholder="• • • • • • • •" autocomplete="off">
            <div class="keypad" id="keypad">
                <button type="button" class="key" data-k="1">1</button>
                <button type="button" class="key" data-k="2">2</button>
                <button type="button" class="key" data-k="3">3</button>
                <button type="button" class="key" data-k="4">4</button>
                <button type="button" class="key" data-k="5">5</button>
                <button type="button" class="key" data-k="6">6</button>
                <button type="button" class="key" data-k="7">7</button>
                <button type="button" class="key" data-k="8">8</button>
                <button type="button" class="key" data-k="9">9</button>
                <button type="button" class="key ghost" data-k="clear">⌫</button>
                <button type="button" class="key" data-k="0">0</button>
                <button type="submit" class="key action">Open</button>
            </div>
            <p id="error-message"></p>
            <img id="wrong-gif" src="dudu-no-dudu.gif" alt="Dudu Bubu saying no">
            <button id="submit-button" type="submit" aria-hidden="true">Unlock</button>
        </form>
    </div>

    <!-- --- Main Content Wrapper --- -->
    <div id="main-content">
        <div id="nebula"></div>
        <div id="parallax-layer"></div>
        <div id="shooters"></div>
        <div id="progress" aria-label="Stars discovered">
            <span class="p-label">Constellation</span>
            <span class="p-dot" data-i="0"></span>
            <span class="p-dot" data-i="1"></span>
            <span class="p-dot" data-i="2"></span>
            <span class="p-dot" data-i="3"></span>
            <span class="p-dot" data-i="4"></span>
        </div>
        <div id="universe-container"></div>
        <div id="filler-stars-container"></div>
        <div id="intro-message">
            Every star has a story. Click one to see.
            <span class="sub">— five wishes await —</span>
        </div>
        <div id="final-message" class="hidden">Every star I’ve ever wished on led to you.</div>
        <div id="modal" class="hidden">
            <div id="modal-content">
                <span class="close-button">&times;</span>
                <img id="modal-image" src="" alt="Memory">
                <p id="modal-caption"></p>
            </div>
        </div>
        <audio id="final-music" src="music.mp3" preload="auto" loop></audio>
    </div>

    <script>
        /* ---------- Loader ---------- */
        (function initLoader(){
            const petals = document.getElementById('loaderPetals');
            if (petals) {
                for (let i = 0; i < 40; i++) {
                    const p = document.createElement('span');
                    p.className = 'petal';
                    p.style.left = Math.random() * 100 + '%';
                    const dur = 6 + Math.random() * 8;
                    p.style.animationDuration = dur + 's';
                    p.style.animationDelay = (-Math.random() * dur) + 's';
                    const size = 2 + Math.random() * 3;
                    p.style.width = size + 'px';
                    p.style.height = size + 'px';
                    p.style.opacity = (.5 + Math.random() * .5).toFixed(2);
                    petals.appendChild(p);
                }
            }
            const msgEl = document.getElementById('loaderMsg');
            const messages = [
                'Aligning the constellations',
                'Gathering stardust',
                'Lighting the galaxies',
                'Painting the night sky',
                'Almost ready for you'
            ];
            let mi = 0;
            const msgTimer = setInterval(() => {
                if (!msgEl) return;
                mi = (mi + 1) % messages.length;
                msgEl.style.animation = 'none';
                void msgEl.offsetWidth;
                msgEl.style.animation = '';
                msgEl.textContent = messages[mi];
            }, 1600);

            window.addEventListener('load', () => {
                setTimeout(() => {
                    clearInterval(msgTimer);
                    const l = document.getElementById('loader');
                    if (!l) return;
                    l.style.opacity = '0';
                    setTimeout(() => l.remove(), 700);
                }, 1200);
            });
        })();

        document.addEventListener('DOMContentLoaded', () => {

            /* ---------- Password Lock ---------- */
            const passwordOverlay = document.getElementById('password-overlay');
            const lockBox = document.getElementById('lock-box');
            const passwordInput = document.getElementById('password-input');
            const errorMessage = document.getElementById('error-message');
            const mainContent = document.getElementById('main-content');
            const lockIcon = document.getElementById('lockIcon');
            const correctPassword = "28072018";

            if (sessionStorage.getItem('isUnlocked') === 'true') {
                passwordOverlay.style.display = 'none';
                mainContent.style.visibility = 'visible';
            }

            document.getElementById('keypad').addEventListener('click', (e) => {
                const k = e.target.closest('.key');
                if (!k) return;
                const v = k.dataset.k;
                if (!v) return;
                if (v === 'clear') passwordInput.value = passwordInput.value.slice(0, -1);
                else if (passwordInput.value.length < 8) passwordInput.value += v;
            });

            lockBox.addEventListener('submit', (e) => {
                e.preventDefault();
                const enteredPassword = passwordInput.value;

                if (enteredPassword === correctPassword) {
                    sessionStorage.setItem('isUnlocked', 'true');
                    const wrongGif = document.getElementById('wrong-gif');
                    if (wrongGif) wrongGif.classList.remove('show');
                    lockIcon.classList.add('unlocked');
                    setTimeout(() => {
                        passwordOverlay.style.opacity = '0';
                        setTimeout(() => { passwordOverlay.style.display = 'none'; }, 500);
                        mainContent.style.visibility = 'visible';
                    }, 600);
                } else {
                    errorMessage.textContent = 'Wrong Password. Try Again!';
                    lockBox.classList.add('shake');
                    const wrongGif = document.getElementById('wrong-gif');
                    if (wrongGif) {
                        wrongGif.classList.remove('show');
                        void wrongGif.offsetWidth;
                        wrongGif.classList.add('show');
                    }
                    passwordInput.value = '';
                    setTimeout(() => {
                        lockBox.classList.remove('shake');
                        errorMessage.textContent = '';
                        if (wrongGif) wrongGif.classList.remove('show');
                    }, 1000);
                }
            });

            /* --- Original Star Game Script --- */
            const starContainer = document.getElementById('universe-container');
            const fillerStarContainer = document.getElementById('filler-stars-container');
            const modal = document.getElementById('modal');
            const modalImage = document.getElementById('modal-image');
            const modalCaption = document.getElementById('modal-caption');
            const closeButton = document.querySelector('.close-button');
            const introMessage = document.getElementById('intro-message');
            const finalMessage = document.getElementById('final-message');
            const finalMusic = document.getElementById('final-music');

            let clickedStarCount = 0;
            const totalStars = 5;
            const isMobile = window.innerWidth <= 768;

            let heartCoords, initialsCoords;

            const desktopHeartCoords = [
                {x: 50, y: 35}, {x: 55, y: 30}, {x: 63, y: 30}, {x: 70, y: 35}, {x: 75, y: 42},
                {x: 75, y: 50}, {x: 70, y: 60}, {x: 60, y: 70}, {x: 50, y: 80}, {x: 40, y: 70},
                {x: 30, y: 60}, {x: 25, y: 50}, {x: 25, y: 42}, {x: 30, y: 35}, {x: 37, y: 30},
                {x: 45, y: 30}
            ];
            const desktopInitialsCoords = {
                A1: [ {x: 30, y: 50}, {x: 27, y: 60}, {x: 24, y: 70}, {x: 33, y: 60}, {x: 36, y: 70}, {x: 30, y: 60} ],
                plus: [ {x: 50, y: 60}, {x: 47, y: 60}, {x: 53, y: 60}, {x: 50, y: 57}, {x: 50, y: 63} ],
                A2: [ {x: 70, y: 50}, {x: 67, y: 60}, {x: 64, y: 70}, {x: 73, y: 60}, {x: 76, y: 70}, {x: 70, y: 60} ]
            };

            const mobileHeartCoords = [
                {x: 50, y: 35}, {x: 60, y: 30}, {x: 70, y: 30}, {x: 80, y: 35}, {x: 85, y: 45},
                {x: 80, y: 55}, {x: 70, y: 65}, {x: 50, y: 75}, {x: 30, y: 65}, {x: 20, y: 55},
                {x: 15, y: 45}, {x: 20, y: 35}, {x: 30, y: 30}, {x: 40, y: 30}
            ];
            const mobileInitialsCoords = {
                A1: [ {x: 35, y: 45}, {x: 30, y: 55}, {x: 25, y: 65}, {x: 40, y: 55}, {x: 45, y: 65}, {x: 35, y: 55} ],
                plus: [ {x: 50, y: 55} ],
                A2: [ {x: 65, y: 45}, {x: 60, y: 55}, {x: 55, y: 65}, {x: 70, y: 55}, {x: 75, y: 65}, {x: 65, y: 55} ]
            };

            if (isMobile) {
                heartCoords = mobileHeartCoords;
                initialsCoords = mobileInitialsCoords;
            } else {
                heartCoords = desktopHeartCoords;
                initialsCoords = desktopInitialsCoords;
            }

            const starsData = [
                { id: 'star1', msg: "This one remembers your laugh.", img: "laugh.jpg",
                  initialPos: { x: 30, y: 40 }, heartPos: heartCoords[8], initialsPos: initialsCoords.A1[0] },
                { id: 'star2', msg: "This one remembers your touch.", img: "touch.jpg",
                  initialPos: { x: 50, y: 50 }, heartPos: heartCoords[11], initialsPos: initialsCoords.A1[2] },
                { id: 'star3', msg: "This one remembers our first date.", img: "date.jpg",
                  initialPos: { x: 70, y: 45 }, heartPos: heartCoords[0], initialsPos: initialsCoords.plus[0] },
                { id: 'star4', msg: "This one remembers anniversary.", img: "anniversary.jpg",
                  initialPos: { x: 40, y: 65 }, heartPos: heartCoords[3], initialsPos: initialsCoords.A2[0] },
                { id: 'star5', msg: "This one holds all my secrets.", img: "secrets.jpg",
                  initialPos: { x: 60, y: 60 }, heartPos: heartCoords[6], initialsPos: initialsCoords.A2[4] }
            ];

            starsData.forEach(data => {
                const star = document.createElement('div');
                star.className = 'star';
                star.id = data.id;
                star.style.left = `${data.initialPos.x}%`;
                star.style.top = `${data.initialPos.y}%`;
                star.addEventListener('click', () => onStarClick(star, data));
                starContainer.appendChild(star);
            });

            function onStarClick(starElement, data) {
                if (starElement.classList.contains('clicked')) return;
                starElement.classList.add('clicked');
                spawnBurst(starElement);
                lightProgress(clickedStarCount);
                clickedStarCount++;

                modalImage.src = data.img;
                modalCaption.innerText = data.msg;
                modal.classList.add('visible');

                if (clickedStarCount === totalStars) {
                    setTimeout(runFinalAnimation, 2000);
                }
            }

            /* ---------- Ambient enhancements ---------- */
            // Parallax star layer
            const pLayer = document.getElementById('parallax-layer');
            if (pLayer) {
                for (let i=0; i<90; i++){
                    const s = document.createElement('span');
                    s.className = 'p-star';
                    s.style.left = Math.random()*100 + '%';
                    s.style.top = Math.random()*100 + '%';
                    const sc = .4 + Math.random()*1.4;
                    s.style.transform = `scale(${sc})`;
                    s.style.opacity = (.3 + Math.random()*.7).toFixed(2);
                    pLayer.appendChild(s);
                }
            }
            window.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - .5) * 16;
                const y = (e.clientY / window.innerHeight - .5) * 16;
                if (pLayer) pLayer.style.transform = `translate(${x}px, ${y}px)`;
                spawnCometPoint(e.clientX, e.clientY);
            });

            // Cursor comet trail
            function spawnCometPoint(x,y){
                const c = document.createElement('div');
                c.className = 'comet trail';
                c.style.left = x+'px'; c.style.top = y+'px';
                document.body.appendChild(c);
                requestAnimationFrame(() => { c.style.opacity = '0'; c.style.transform = 'translate(-50%,-50%) scale(.3)'; });
                setTimeout(() => c.remove(), 500);
            }

            // Shooting stars
            const shooters = document.getElementById('shooters');
            function launchShooter(){
                if (!shooters) return;
                const s = document.createElement('div');
                s.className = 'shooter';
                s.style.top = (Math.random()*40) + '%';
                s.style.left = (60 + Math.random()*40) + '%';
                shooters.appendChild(s);
                setTimeout(() => s.remove(), 2400);
            }
            setInterval(() => { if (Math.random() < .7) launchShooter(); }, 3500);
            setTimeout(launchShooter, 1200);

            // Progress dots
            const progressDots = document.querySelectorAll('#progress .p-dot');
            function lightProgress(i){
                const d = progressDots[i];
                if (d) d.classList.add('on');
            }

            // Particle burst on star click
            function spawnBurst(el){
                const rect = el.getBoundingClientRect();
                const cx = rect.left + rect.width/2;
                const cy = rect.top + rect.height/2;
                const wrap = document.createElement('div');
                wrap.className = 'burst';
                wrap.style.left = cx+'px'; wrap.style.top = cy+'px';
                wrap.style.position = 'fixed';
                for (let i=0;i<16;i++){
                    const p = document.createElement('span');
                    const ang = (i/16) * Math.PI*2;
                    const dist = 60 + Math.random()*40;
                    p.style.setProperty('--dx', (Math.cos(ang)*dist)+'px');
                    p.style.setProperty('--dy', (Math.sin(ang)*dist)+'px');
                    p.style.animationDelay = (Math.random()*.08)+'s';
                    wrap.appendChild(p);
                }
                document.body.appendChild(wrap);
                setTimeout(() => wrap.remove(), 1200);
            }

            function closeModal() {
                modal.classList.remove('visible');
            }
            closeButton.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => e.target.id === 'modal' && closeModal());

            function runFinalAnimation() {
                closeModal();
                introMessage.classList.add('hidden');
                finalMusic.play().catch(e => console.log("Audio play prevented by browser"));

                fillerStarContainer.innerHTML = '';
                createFillerStars(heartCoords);

                starsData.forEach(data => {
                    const star = document.getElementById(data.id);
                    star.classList.add('final-look');
                    star.style.left = `${data.heartPos.x}%`;
                    star.style.top = `${data.heartPos.y}%`;
                });

                setTimeout(() => {
                    fillerStarContainer.innerHTML = '';
                    createFillerStars(initialsCoords.A1);
                    if (!isMobile) createFillerStars(initialsCoords.plus);
                    createFillerStars(initialsCoords.A2);

                    starsData.forEach(data => {
                        const star = document.getElementById(data.id);
                        star.style.left = `${data.initialsPos.x}%`;
                        star.style.top = `${data.initialsPos.y}%`;
                    });
                }, 4000);

                setTimeout(() => {
                    finalMessage.classList.remove('hidden');
                }, 7000);
            }

            function createFillerStars(coordinates) {
                coordinates.forEach(coord => {
                    const filler = document.createElement('div');
                    filler.className = 'filler-star';
                    filler.style.left = `${coord.x}%`;
                    filler.style.top = `${coord.y}%`;
                    fillerStarContainer.appendChild(filler);
                    setTimeout(() => filler.style.opacity = '1', 50);
                });
            }
        });
    </script>
</body>
</html>
